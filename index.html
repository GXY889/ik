<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>حارسي الأمين | الإصدار الكامل</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { brand: '#3B82F6', cardBg: '#121212' }
                }
            }
        }
    </script>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { background-color: #000; color: #fff; font-family: 'Tajawal', sans-serif; overflow-x: hidden; }
        .android-card { background: #121212; border-radius: 32px; border: 1px solid rgba(255,255,255,0.05); }
        .input-style { background: #1E1E1E; border: 1px solid #333; border-radius: 16px; padding: 12px; width: 100%; color: white; outline: none; transition: 0.3s; }
        .input-style:focus { border-color: #3B82F6; box-shadow: 0 0 10px rgba(59, 130, 246, 0.2); }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // الأيقونات
        const IconShield = () => <svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="#3B82F6" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>;
        const IconPlus = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
        const IconTrash = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ef4444" strokeWidth="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>;

        function App() {
            const [screen, setScreen] = useState('welcome'); // welcome, vault
            const [passwords, setPasswords] = useState([]);
            const [newSite, setNewSite] = useState('');
            const [newPass, setNewPass] = useState('');

            // تحميل البيانات المحفوظة عند فتح التطبيق
            useEffect(() => {
                const saved = localStorage.getItem('my_guardian_data');
                if (saved) setPasswords(JSON.parse(saved));
            }, []);

            // حفظ البيانات عند كل تغيير
            useEffect(() => {
                localStorage.setItem('my_guardian_data', JSON.stringify(passwords));
            }, [passwords]);

            const addPassword = () => {
                if (!newSite || !newPass) return alert("فضلاً املأ البيانات");
                setPasswords([...passwords, { id: Date.now(), site: newSite, pass: newPass }]);
                setNewSite(''); setNewPass('');
            };

            const deletePassword = (id) => {
                setPasswords(passwords.filter(p => p.id !== id));
            };

            if (screen === 'welcome') {
                return (
                    <div className="min-h-screen flex flex-col justify-center items-center p-6 fade-in">
                        <div className="android-card p-10 w-full max-w-sm text-center shadow-2xl">
                            <div className="flex justify-center mb-6"><IconShield /></div>
                            <h1 className="text-3xl font-bold mb-2">حارسي الأمين</h1>
                            <p className="text-gray-400 mb-8 text-sm">خزنتك المشفرة آمنة الآن</p>
                            <button 
                                onClick={() => setScreen('vault')}
                                className="w-full bg-brand py-4 rounded-2xl font-bold text-lg active:scale-95 transition-all shadow-lg shadow-blue-500/20"
                            >
                                فتح الخزنة
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen p-6 fade-in">
                    <div className="max-w-md mx-auto">
                        <header className="flex justify-between items-center mb-8">
                            <h2 className="text-2xl font-bold text-brand">خزنتي</h2>
                            <button onClick={() => setScreen('welcome')} className="text-gray-500 text-sm italic">خروج آمن</button>
                        </header>

                        {/* إضافة كلمة مرور جديدة */}
                        <div className="android-card p-6 mb-8 border-brand/20">
                            <h3 className="text-sm font-bold mb-4 text-gray-300">إضافة حساب جديد</h3>
                            <div className="space-y-3">
                                <input className="input-style" placeholder="اسم الموقع (مثال: فيسبوك)" value={newSite} onChange={(e) => setNewSite(e.target.value)} />
                                <input className="input-style" type="password" placeholder="كلمة المرور" value={newPass} onChange={(e) => setNewPass(e.target.value)} />
                                <button onClick={addPassword} className="w-full bg-brand/20 text-brand py-3 rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-brand hover:text-white transition-all">
                                    <IconPlus /> إضافة للحارس
                                </button>
                            </div>
                        </div>

                        {/* قائمة كلمات المرور */}
                        <div className="space-y-4">
                            <h3 className="text-sm font-bold text-gray-500 pr-2">الحسابات المحفوظة ({passwords.length})</h3>
                            {passwords.length === 0 && <p className="text-center text-gray-600 mt-10">لا يوجد حسابات محفوظة بعد..</p>}
                            {passwords.map(p => (
                                <div key={p.id} className="android-card p-5 flex justify-between items-center fade-in">
                                    <div>
                                        <h4 className="font-bold text-white">{p.site}</h4>
                                        <p className="text-gray-500 text-sm font-mono tracking-widest">••••••••</p>
                                    </div>
                                    <button onClick={() => deletePassword(p.id)} className="p-2 bg-red-500/10 rounded-lg"><IconTrash /></button>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
