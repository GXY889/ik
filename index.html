<!DOCTYPE html>
<html lang="ar" dir="rtl" class="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>حارسي الأمين (My Guardian)</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#0A84FF', midnight: '#000000' }
                }
            }
        }
    </script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

    <style>
        body { background-color: #000000; color: white; font-family: 'Tajawal', sans-serif; overflow: hidden; }
        .glass-panel {
            background: rgba(28, 28, 30, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // تعريف الأيقونات بطريقة تناسب المتصفح مباشرة
        const ShieldIcon = () => <i data-lucide="shield"></i>;
        const LockIcon = () => <i data-lucide="lock"></i>;

        function App() {
            // كود لتشغيل الأيقونات بعد تحميل الصفحة
            React.useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, []);

            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-6 bg-black">
                    <div className="glass-panel p-10 rounded-[2.5rem] max-w-sm w-full text-center shadow-2xl border border-white/10">
                        <div className="bg-primary/20 w-20 h-20 rounded-2xl flex items-center justify-center mx-auto mb-6 text-primary">
                             <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                        </div>
                        
                        <h1 className="text-3xl font-bold mb-2 text-white">حارسي الأمين</h1>
                        <p className="text-gray-400 mb-8 text-sm">خزنة كلمات المرور الشخصية</p>
                        
                        <div className="space-y-4">
                            <button className="w-full bg-primary hover:bg-blue-600 text-white font-bold py-4 rounded-2xl transition-all transform active:scale-95 shadow-lg shadow-primary/20">
                                فتح الخزنة
                            </button>
                            <button className="w-full bg-white/5 hover:bg-white/10 text-white py-4 rounded-2xl transition-all border border-white/5">
                                إنشاء حساب جديد
                            </button>
                        </div>
                    </div>
                    <p className="mt-10 text-gray-600 text-xs tracking-widest">تشفير AES-256 معتمد</p>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
