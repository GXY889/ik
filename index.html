<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>حارسي الأمين | تحديث الكوبالت</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { background-color: #000; color: #fff; font-family: 'Tajawal', sans-serif; margin: 0; padding: 0; overflow: hidden; }
        .main-container { height: 100vh; display: flex; flex-direction: column; position: relative; }
        .content-area { flex: 1; overflow-y: auto; padding-bottom: 90px; }
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 80px; background: #181818; display: flex; border-top: 1px solid rgba(255,255,255,0.1); z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; color: #555; transition: 0.3s; cursor: pointer; }
        .nav-item.active { color: #3B82F6; }
        .nav-item.active-yt { color: #FF0000; }
        .input-android { background: #1a1a1a; border-radius: 18px; padding: 18px; width: 100%; border: 1px solid #333; color: white; outline: none; transition: 0.3s; }
        .input-android:focus { border-color: #3B82F6; background: #222; }
        .fade-in { animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const IconLock = () => <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#3B82F6" strokeWidth="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>;
        const IconVault = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>;
        const IconVideo = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.42a2.78 2.78 0 0 0-1.94 2C1 8.11 1 12 1 12s0 3.89.46 5.58a2.78 2.78 0 0 0 1.94 2C5.12 20 12 20 12 20s6.88 0 8.6-.42a2.78 2.78 0 0 0 1.94-2C23 15.89 23 12 23 12s0-3.89-.46-5.58z"></path><polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02"></polygon></svg>;

        function App() {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [nameInput, setNameInput] = useState('');
            const [tab, setTab] = useState('vault');
            const [passwords, setPasswords] = useState([]);
            const [form, setForm] = useState({site:'', email:'', pass:''});
            const [videoUrl, setVideoUrl] = useState('');

            useEffect(() => {
                const data = localStorage.getItem('guard_final_v6');
                if (data) setPasswords(JSON.parse(data));
            }, []);

            const handleLogin = () => {
                if (nameInput.trim() === 'عبد الله' || nameInput.trim() === 'عبدالله') {
                    setIsLoggedIn(true);
                } else {
                    alert('هذا التطبيق مخصص للمبرمج عبد الله فقط! 🛑');
                }
            };

            const savePass = () => {
                if(!form.site || !form.pass) return alert("عبّ البيانات يا بطل");
                const newPasses = [{id:Date.now(), ...form}, ...passwords];
                setPasswords(newPasses);
                localStorage.setItem('guard_final_v6', JSON.stringify(newPasses));
                setForm({site:'', email:'', pass:''});
            };

            if (!isLoggedIn) {
                return (
                    <div className="h-screen flex flex-col justify-center items-center p-8 fade-in bg-black">
                        <div className="bg-[#111] p-10 rounded-[35px] w-full max-w-sm text-center border border-white/10 shadow-2xl">
                            <div className="flex justify-center mb-6"><IconLock /></div>
                            <h1 className="text-3xl font-black mb-2 tracking-tighter">حارسي الأمين</h1>
                            <p className="text-gray-500 text-sm mb-10 font-medium">أثبت هويتك يا عبد الله</p>
                            <input className="input-android text-center mb-6" placeholder="من المبرمج؟" value={nameInput} onChange={e => setNameInput(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && handleLogin()}/>
                            <button onClick={handleLogin} className="w-full bg-brand py-5 rounded-[22px] font-black text-lg active:scale-95 transition-all shadow-lg shadow-brand/20">دخول</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="main-container fade-in">
                    <div className="content-area p-6">
                        {tab === 'vault' ? (
                            <div className="space-y-6">
                                <header className="pt-4 flex justify-between items-center">
                                    <h1 className="text-3xl font-black text-brand tracking-tighter">أهلاً يا عبد الله 👋</h1>
                                    <button onClick={()=>setIsLoggedIn(false)} className="bg-white/5 px-4 py-2 rounded-full text-[10px] text-gray-400">خروج</button>
                                </header>
                                <div className="bg-[#111] p-6 rounded-[28px] border border-white/10 space-y-4">
                                    <input className="input-android" placeholder="الموقع" value={form.site} onChange={e=>setForm({...form, site:e.target.value})} />
                                    <input className="input-android" placeholder="الإيميل / اليوزر" value={form.email} onChange={e=>setForm({...form, email:e.target.value})} />
                                    <input className="input-android" type="password" placeholder="كلمة المرور" value={form.pass} onChange={e=>setForm({...form, pass:e.target.value})} />
                                    <button onClick={savePass} className="w-full bg-brand py-4 rounded-2xl font-black active:scale-95">حفظ البيانات</button>
                                </div>
                                <div className="space-y-3">
                                    {passwords.map(p => (
                                        <div key={p.id} className="bg-[#111] p-5 rounded-2xl flex justify-between items-center border border-white/5">
                                            <div><p className="font-black text-blue-400">{p.site}</p><p className="text-[11px] text-gray-500">{p.email}</p></div>
                                            <button onClick={()=> {navigator.clipboard.writeText(p.pass); alert("تم النسخ!");}} className="bg-white/5 px-5 py-2 rounded-xl text-xs font-bold">نسخ</button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ) : (
                            <div className="pt-12 text-center space-y-8 fade-in px-4">
                                <div className="text-yt animate-bounce flex justify-center"><IconVideo /></div>
                                <h2 className="text-2xl font-black">المحمل الخارق (Cobalt) ⚡</h2>
                                <p className="text-gray-400 text-xs px-6">هذا السيرفر ما يعرف كلمة "مستحيل". الصق الرابط واضغط الزر.</p>
                                
                                <div className="space-y-4">
                                    <input className="input-android text-center" placeholder="الصق الرابط هنا..." value={videoUrl} onChange={e=>setVideoUrl(e.target.value)} />
                                    <div className="grid grid-cols-1 gap-4">
                                        <button onClick={()=>window.open(`https://cobalt.tools/`, '_blank')} className="w-full bg-brand py-5 rounded-[25px] font-black text-lg shadow-xl shadow-brand/30 active:scale-95 transition-all">🚀 افتح Cobalt (الأقوى عالمياً)</button>
                                        <button onClick={()=>window.open(`https://pastedownload.com/28/`, '_blank')} className="w-full bg-white/10 py-4 rounded-2xl font-bold active:scale-95">سيرفر احتياطي (Paste)</button>
                                    </div>
                                    <div className="bg-blue-900/20 p-4 rounded-2xl text-[11px] text-blue-300 text-right leading-relaxed border border-blue-500/20">
                                        📌 <strong>طريقة الكوبالت:</strong><br/>
                                        1. اضغط الزر الأزرق.<br/>
                                        2. الصق الرابط في المربع هناك.<br/>
                                        3. اضغط السهم الأزرق وحمل مباشرة بدون إعلانات!
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                    <nav className="nav-bar">
                        <div onClick={() => setTab('vault')} className={`nav-item ${tab === 'vault' ? 'active' : ''}`}><IconVault /><span className="mt-1">الخزنة</span></div>
                        <div onClick={() => setTab('video')} className={`nav-item ${tab === 'video' ? 'active-yt' : ''}`}><IconVideo /><span className="mt-1">المحمل</span></div>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
