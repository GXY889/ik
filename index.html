<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>حارسي الأمين | Pro</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { brand: '#3B82F6', yt: '#FF0000', card: '#121212' }
                }
            }
        }
    </script>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { background-color: #000; color: #fff; font-family: 'Tajawal', sans-serif; margin: 0; overflow: hidden; }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; transition: 0.3s; }
        .nav-btn.active { color: #3B82F6; }
        .android-input { background: #1E1E1E; border-radius: 16px; padding: 14px; width: 100%; border: 1px solid #333; color: white; outline: none; }
        .android-input:focus { border-color: #3B82F6; }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // الأيقونات المدمجة (SVGs)
        const IconVault = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>;
        const IconVideo = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.42a2.78 2.78 0 0 0-1.94 2C1 8.11 1 12 1 12s0 3.89.46 5.58a2.78 2.78 0 0 0 1.94 2C5.12 20 12 20 12 20s6.88 0 8.6-.42a2.78 2.78 0 0 0 1.94-2C23 15.89 23 12 23 12s0-3.89-.46-5.58z"></path><polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02"></polygon></svg>;
        const IconCopy = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>;

        function App() {
            const [tab, setTab] = useState('vault'); // vault or video
            const [passwords, setPasswords] = useState([]);
            const [videoUrl, setVideoUrl] = useState('');
            
            // بيانات الخزنة
            const [site, setSite] = useState('');
            const [email, setEmail] = useState('');
            const [pass, setPass] = useState('');

            useEffect(() => {
                const data = localStorage.getItem('guardian_pro');
                if (data) setPasswords(JSON.parse(data));
            }, []);

            useEffect(() => {
                localStorage.setItem('guardian_pro', JSON.stringify(passwords));
            }, [passwords]);

            const handleDownload = () => {
                if (!videoUrl) return;
                // الطريقة الملتوية: نستخدم بروتوكول تحويل الروابط الخارجي المباشر
                const bypassUrl = `https://9xbuddy.com/process?url=${encodeURIComponent(videoUrl)}`;
                window.open(bypassUrl, '_blank');
            };

            const addAccount = () => {
                if (!site || !pass) return;
                setPasswords([{id: Date.now(), site, email, pass}, ...passwords]);
                setSite(''); setEmail(''); setPass('');
            };

            return (
                <div className="flex flex-col h-screen overflow-hidden">
                    {/* محتوى الصفحة المتغير */}
                    <main className="flex-1 overflow-y-auto p-5 pb-24">
                        {tab === 'vault' ? (
                            <div className="fade-in space-y-6">
                                <h1 className="text-2xl font-black text-brand tracking-tighter pt-4">خزنة الحارس</h1>
                                <div className="bg-card p-5 rounded-[24px] border border-white/5 space-y-3">
                                    <input className="android-input text-sm" placeholder="الموقع" value={site} onChange={e=>setSite(e.target.value)} />
                                    <input className="android-input text-sm" placeholder="الإيميل" value={email} onChange={e=>setEmail(e.target.value)} />
                                    <input className="android-input text-sm" type="password" placeholder="كلمة المرور" value={pass} onChange={e=>setPass(e.target.value)} />
                                    <button onClick={addAccount} className="w-full bg-brand py-4 rounded-xl font-bold active:scale-95">إضافة حساب</button>
                                </div>
                                
                                <div className="space-y-3">
                                    {passwords.map(p => (
                                        <div key={p.id} className="bg-card p-4 rounded-2xl flex justify-between items-center border border-white/5">
                                            <div>
                                                <div className="font-bold text-blue-400">{p.site}</div>
                                                <div className="text-[10px] text-gray-500">{p.email}</div>
                                            </div>
                                            <button onClick={() => navigator.clipboard.writeText(p.pass)} className="bg-white/5 p-3 rounded-xl"><IconCopy /></button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ) : (
                            <div className="fade-in space-y-6 text-center pt-10">
                                <div className="flex justify-center text-yt animate-pulse"><IconVideo /></div>
                                <h1 className="text-2xl font-black">مستعرض المقاطع</h1>
                                <p className="text-gray-500 text-xs">الصق رابط المقطع للبدء في المعالجة</p>
                                <div className="space-y-4">
                                    <input 
                                        className="android-input text-center" 
                                        placeholder="رابط يوتيوب هنا..." 
                                        value={videoUrl}
                                        onChange={e=>setVideoUrl(e.target.value)}
                                    />
                                    <button 
                                        onClick={handleDownload}
                                        className="w-full bg-yt py-5 rounded-[24px] font-black text-lg active:scale-95 shadow-lg shadow-yt/20"
                                    >
                                        تحليل الرابط والتحميل
                                    </button>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* شريط التنقل السفلي (مثل تطبيقات أندرويد) */}
                    <nav className="h-20 bg-card border-t border-white/5 flex items-center px-6">
                        <button onClick={() => setTab('vault')} className={`nav-btn ${tab === 'vault' ? 'active' : 'text-gray-600'}`}>
                            <IconVault />
                            <span className="mt-1">الخزنة</span>
                        </button>
                        <button onClick={() => setTab('video')} className={`nav-btn ${tab === 'video' ? 'active' : 'text-gray-600'}`}>
                            <IconVideo />
                            <span className="mt-1">المحمل</span>
                        </button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
