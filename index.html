<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>حارسي الأمين | محرك التحميل الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Tajawal', sans-serif; margin: 0; padding: 0; overflow: hidden; }
        .main-container { height: 100vh; display: flex; flex-direction: column; }
        .content-area { flex: 1; overflow-y: auto; padding-bottom: 90px; }
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 80px; background: #1a1a1a; display: flex; border-top: 1px solid rgba(255,255,255,0.05); z-index: 100; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; color: #444; }
        .nav-item.active { color: #3B82F6; }
        .input-android { background: #111; border-radius: 16px; padding: 18px; width: 100%; border: 1px solid #333; color: white; outline: none; }
        .btn-action { width: 100%; py: 4; border-radius: 20px; font-bold: true; transition: all 0.2s; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const IconVault = () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>;
        const IconDL = () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>;

        function App() {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [nameInput, setNameInput] = useState('');
            const [tab, setTab] = useState('vault');
            const [passwords, setPasswords] = useState([]);
            const [form, setForm] = useState({site:'', email:'', pass:''});
            const [videoUrl, setVideoUrl] = useState('');

            useEffect(() => {
                const data = localStorage.getItem('guard_v9_master');
                if (data) setPasswords(JSON.parse(data));
            }, []);

            const handleLogin = () => {
                if (nameInput.trim() === 'عبد الله' || nameInput.trim() === 'عبدالله') setIsLoggedIn(true);
            };

            const savePass = () => {
                const newPasses = [{id:Date.now(), ...form}, ...passwords];
                setPasswords(newPasses);
                localStorage.setItem('guard_v9_master', JSON.stringify(newPasses));
                setForm({site:'', email:'', pass:''});
            };

            if (!isLoggedIn) {
                return (
                    <div className="h-screen flex flex-col justify-center items-center p-8 bg-black">
                        <div className="bg-[#111] p-10 rounded-[35px] w-full max-w-sm text-center border border-white/5 shadow-2xl">
                            <h1 className="text-2xl font-black mb-8 tracking-tighter">حارسي الأمين 🔒</h1>
                            <input className="input-android text-center mb-4" placeholder="اسم المبرمج؟" value={nameInput} onChange={e=>setNameInput(e.target.value)} onKeyPress={e=>e.key==='Enter' && handleLogin()}/>
                            <button onClick={handleLogin} className="w-full bg-blue-600 py-4 rounded-2xl font-black shadow-lg shadow-blue-600/20">تأكيد</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="main-container fade-in">
                    <div className="content-area p-6">
                        {tab === 'vault' ? (
                            <div className="space-y-6">
                                <h1 className="text-3xl font-black text-blue-500 pt-4">خزنة الحسابات</h1>
                                <div className="bg-[#111] p-6 rounded-[28px] border border-white/5 space-y-4">
                                    <input className="input-android" placeholder="اسم الموقع" value={form.site} onChange={e=>setForm({...form, site:e.target.value})} />
                                    <input className="input-android" placeholder="اليوزر" value={form.email} onChange={e=>setForm({...form, email:e.target.value})} />
                                    <input className="input-android" type="password" placeholder="كلمة المرor" value={form.pass} onChange={e=>setForm({...form, pass:e.target.value})} />
                                    <button onClick={savePass} className="w-full bg-blue-600 py-4 rounded-xl font-bold">حفظ في الخزنة</button>
                                </div>
                                <div className="space-y-3">
                                    {passwords.map(p => (
                                        <div key={p.id} className="bg-[#111] p-5 rounded-2xl flex justify-between items-center border border-white/5">
                                            <div><p className="font-bold text-blue-400">{p.site}</p><p className="text-xs text-gray-500">{p.email}</p></div>
                                            <button onClick={()=> {navigator.clipboard.writeText(p.pass); alert("تم النسخ!");}} className="bg-white/5 px-4 py-2 rounded-lg text-xs">نسخ</button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ) : (
                            <div className="pt-12 text-center space-y-8 px-4">
                                <div className="bg-blue-600/10 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-2"><IconDL /></div>
                                <h2 className="text-2xl font-black tracking-tight">إدارة التحميل الذكي</h2>
                                <p className="text-gray-500 text-xs px-4">نظام تحميل مباشر يتجاوز حظر "لايت سبيد" ويوتيوب</p>
                                
                                <div className="space-y-4">
                                    <input className="input-android text-center border-blue-900/20" placeholder="الصق رابط المقطع هنا..." value={videoUrl} onChange={e=>setVideoUrl(e.target.value)} />
                                    <div className="grid grid-cols-1 gap-4">
                                        
                                        {/* السيرفر الأول: محرك البحث المباشر (الأقوى حالياً) */}
                                        <button onClick={()=>window.open(`https://dirpy.com/from/youtube?url=${encodeURIComponent(videoUrl)}`, '_blank')} className="w-full bg-blue-600 py-5 rounded-[22px] font-black text-lg shadow-xl shadow-blue-600/30 active:scale-95 transition-all">🚀 تحميل بجودة عالية (Dirpy)</button>
                                        
                                        {/* السيرفر الثاني: البوابة البرمجية (تتجاوز الـ 404) */}
                                        <button onClick={()=>window.open(`https://keepv.id/?url=${encodeURIComponent(videoUrl)}`, '_blank')} className="w-full bg-indigo-600 py-4 rounded-2xl font-bold active:scale-95">🔗 سيرفر التحميل المباشر</button>
                                        
                                        {/* السيرفر الثالث: محرك 10Downloader */}
                                        <button onClick={()=>window.open(`https://10downloader.com/download?v=${encodeURIComponent(videoUrl)}`, '_blank')} className="w-full bg-gray-800 py-4 rounded-2xl font-bold active:scale-95">🌐 سيرفر احتياطي 3</button>
                                    </div>

                                    <div className="p-4 rounded-2xl text-[10px] text-gray-500 text-right leading-relaxed bg-white/5">
                                        📌 <strong>طريقة إدارة الملفات:</strong><br/>
                                        اضغط على الزر الأزرق، راح يحلل الرابط ويطلع لك "Download" بالدقة اللي تبيها. إذا طلب منك "LiteSpeed" أو إعلان، اسحب عليه وجرب السيرفر الثاني.
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                    <nav className="nav-bar">
                        <div onClick={() => setTab('vault')} className={`nav-item ${tab === 'vault' ? 'active' : ''}`}><IconVault /><span className="mt-1">الخزنة</span></div>
                        <div onClick={() => setTab('video')} className={`nav-item ${tab === 'video' ? 'active' : ''}`}><IconDL /><span className="mt-1">التحميل</span></div>
                    </nav>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
