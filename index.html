<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تجربة حارسي الأمين</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white">
    <div id="root"></div>

    <script type="text/babel">
        // هنا نكتب كود بسيط جداً بدون أي مكتبات أيقونات خارجية
        function App() {
            return (
                <div className="flex flex-col items-center justify-center min-h-screen">
                    <div className="p-10 bg-gray-900 rounded-3xl border border-blue-500 shadow-2xl text-center">
                        <h1 className="text-4xl font-bold text-blue-500 mb-4">حارسي الأمين</h1>
                        <p className="text-gray-400">إذا رأيت هذه الرسالة، فالموقع يعمل بنجاح!</p>
                        <button 
                            onClick={() => alert('تعمل!')}
                            className="mt-6 px-8 py-3 bg-blue-600 rounded-xl hover:bg-blue-700 transition-all"
                        >
                            اضغط هنا للتجربة
                        </button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
