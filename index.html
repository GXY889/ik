<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>حارسي الأمين | الإصدار المطور</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { brand: '#3B82F6', cardBg: '#121212', surface: '#1E1E1E' }
                }
            }
        }
    </script>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { background-color: #000; color: #fff; font-family: 'Tajawal', sans-serif; margin: 0; }
        .android-card { background: #121212; border-radius: 28px; border: 1px solid rgba(255,255,255,0.05); }
        .input-style { background: #1E1E1E; border: 1px solid #333; border-radius: 14px; padding: 14px; width: 100%; color: white; outline: none; transition: 0.3s; font-size: 14px; }
        .input-style:focus { border-color: #3B82F6; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .copy-toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #3B82F6; color: white; padding: 8px 20px; border-radius: 50px; font-size: 12px; z-index: 100; animation: bounce 0.3s ease; }
        @keyframes bounce { 0% { transform: translate(-50%, 20px); } 100% { transform: translate(-50%, 0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // الأيقونات
        const IconShield = () => <svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="#3B82F6" strokeWidth="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>;
        const IconCopy = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>;
        const IconPlus = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
        const IconTrash = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ef4444" strokeWidth="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>;

        function App() {
            const [screen, setScreen] = useState('welcome');
            const [passwords, setPasswords] = useState([]);
            const [newSite, setNewSite] = useState('');
            const [newEmail, setNewEmail] = useState('');
            const [newPass, setNewPass] = useState('');
            const [showToast, setShowToast] = useState(false);

            useEffect(() => {
                const saved = localStorage.getItem('my_guardian_v2');
                if (saved) setPasswords(JSON.parse(saved));
            }, []);

            useEffect(() => {
                localStorage.setItem('my_guardian_v2', JSON.stringify(passwords));
            }, [passwords]);

            const copyToClipboard = (text) => {
                navigator.clipboard.writeText(text);
                setShowToast(true);
                setTimeout(() => setShowToast(false), 2000);
            };

            const addAccount = () => {
                if (!newSite || !newPass) return alert("اسم الموقع وكلمة المرور ضرورية");
                setPasswords([{ id: Date.now(), site: newSite, email: newEmail, pass: newPass }, ...passwords]);
                setNewSite(''); setNewEmail(''); setNewPass('');
            };

            const deleteAccount = (id) => {
                if(confirm("هل تريد حذف هذا الحساب؟")) {
                    setPasswords(passwords.filter(p => p.id !== id));
                }
            };

            if (screen === 'welcome') {
                return (
                    <div className="min-h-screen flex flex-col justify-center items-center p-6 fade-in">
                        <div className="android-card p-10 w-full max-w-sm text-center shadow-2xl border-blue-500/10">
                            <div className="flex justify-center mb-6 scale-110"><IconShield /></div>
                            <h1 className="text-3xl font-black mb-2 tracking-tight">حارسي الأمين</h1>
                            <p className="text-gray-500 mb-10 text-sm font-medium">نظام حماية الحسابات الشخصي</p>
                            <button onClick={() => setScreen('vault')} className="w-full bg-brand py-4 rounded-[20px] font-bold text-lg shadow-lg shadow-blue-500/30 active:scale-95 transition-all">
                                دخول الخزنة
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen p-5 fade-in pb-20">
                    {showToast && <div className="copy-toast">تم النسخ بنجاح!</div>}
                    <div className="max-w-md mx-auto">
                        <header className="flex justify-between items-center mb-8 pt-4 px-2">
                            <h2 className="text-2xl font-black text-brand tracking-tighter">حساباتي الآمنة</h2>
                            <button onClick={() => setScreen('welcome')} className="text-gray-500 text-xs font-bold uppercase tracking-widest border border-white/10 px-3 py-1 rounded-full">Logout</button>
                        </header>

                        {/* فورم الإضافة */}
                        <div className="android-card p-6 mb-10 bg-white/[0.02]">
                            <h3 className="text-xs font-black mb-5 text-blue-500 uppercase tracking-widest">إضافة حساب جديد</h3>
                            <div className="space-y-4">
                                <input className="input-style" placeholder="اسم الموقع / التطبيق" value={newSite} onChange={(e) => setNewSite(e.target.value)} />
                                <input className="input-style" placeholder="البريد الإلكتروني أو المستخدم" value={newEmail} onChange={(e) => setNewEmail(e.target.value)} />
                                <input className="input-style" type="password" placeholder="كلمة المرور" value={newPass} onChange={(e) => setNewPass(e.target.value)} />
                                <button onClick={addAccount} className="w-full bg-brand text-white py-4 rounded-2xl font-bold flex items-center justify-center gap-2 shadow-lg shadow-blue-500/20 active:scale-95 transition-all">
                                    <IconPlus /> حفظ البيانات
                                </button>
                            </div>
                        </div>

                        {/* قائمة البيانات */}
                        <div className="space-y-4">
                            {passwords.length === 0 ? (
                                <div className="text-center py-20 opacity-20">
                                    <IconShield />
                                    <p className="mt-4 font-bold">الخزنة فارغة حالياً</p>
                                </div>
                            ) : (
                                passwords.map(p => (
                                    <div key={p.id} className="android-card p-5 fade-in flex flex-col gap-3">
                                        <div className="flex justify-between items-start">
                                            <div>
                                                <h4 className="font-black text-blue-400 text-lg">{p.site}</h4>
                                                <p className="text-gray-400 text-sm mt-1">{p.email || 'بدون إيميل'}</p>
                                            </div>
                                            <button onClick={() => deleteAccount(p.id)} className="p-2 hover:bg-red-500/10 rounded-full transition-colors">
                                                <IconTrash />
                                            </button>
                                        </div>
                                        <div className="flex gap-2 mt-2">
                                            <button onClick={() => copyToClipboard(p.email)} className="flex-1 bg-white/5 py-3 rounded-xl text-[12px] font-bold flex items-center justify-center gap-2 active:bg-white/10">
                                                <IconCopy /> نسخ الإيميل
                                            </button>
                                            <button onClick={() => copyToClipboard(p.pass)} className="flex-1 bg-brand/10 text-brand py-3 rounded-xl text-[12px] font-bold flex items-center justify-center gap-2 active:bg-brand/20">
                                                <IconCopy /> نسخ السِر
                                            </button>
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
