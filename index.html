<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>حارسي الأمين</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#3B82F6', surface: '#121212' },
                    fontFamily: { sans: ['Tajawal', 'sans-serif'] }
                }
            }
        }
    </script>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { 
            background-color: #000000; 
            color: white; 
            font-family: 'Tajawal', sans-serif;
            -webkit-tap-highlight-color: transparent; /* يمنع الوميض الأزرق عند اللمس في أندرويد */
        }
        .android-card {
            background: #1E1E1E;
            border-radius: 28px; /* زوايا أندرويد الشهيرة */
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .ripple-btn {
            position: relative;
            overflow: hidden;
            transition: background 0.2s;
        }
        .ripple-btn:active {
            background-color: rgba(59, 130, 246, 0.8);
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const ShieldIcon = () => (
            <svg viewBox="0 0 24 24" width="60" height="60" stroke="#3B82F6" strokeWidth="1.5" fill="none">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
            </svg>
        );

        function App() {
            return (
                <div className="flex flex-col min-h-screen p-4 justify-between bg-black">
                    {/* شريط الحالة العلوي الوهمي */}
                    <div className="h-6"></div>

                    <div className="android-card p-8 w-full max-w-sm mx-auto shadow-2xl">
                        <div className="flex justify-center mb-8">
                            <div className="p-4 bg-blue-500/10 rounded-full shadow-[0_0_30px_rgba(59,130,246,0.2)]">
                                <ShieldIcon />
                            </div>
                        </div>
                        
                        <h1 className="text-3xl font-black mb-2 text-center text-white">حارسي الأمين</h1>
                        <p className="text-gray-400 mb-10 text-center text-sm px-4">
                            خزنتك الذكية والمشفرة لحماية خصوصيتك
                        </p>
                        
                        <div className="space-y-4">
                            <button className="ripple-btn w-full bg-blue-600 text-white font-bold py-4 rounded-[18px] text-lg shadow-lg">
                                دخول البصمة
                            </button>
                            
                            <button className="w-full bg-transparent border border-gray-700 text-white py-4 rounded-[18px] font-medium">
                                كلمة المرور
                            </button>
                        </div>
                    </div>

                    {/* تذييل الصفحة كأنه شريط أندرويد */}
                    <div className="pb-8 text-center">
                        <p className="text-gray-600 text-[11px] font-bold uppercase tracking-widest mb-2">Google Play Protect Verified</p>
                        <div className="w-32 h-1 bg-gray-800 mx-auto rounded-full"></div> {/* شريط سحب أندرويد */}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
